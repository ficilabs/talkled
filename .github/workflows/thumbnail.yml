name: Thumbnail

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  thumbnail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📸 Generate Thumbnail
        uses: ficilabs/automation-thumbnail@main  # 🔥 langsung pakai
        with:
          url: "https://talkled-ficilabs.vercel.app"

      - name: 💾 Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add thumbnails/
          git commit -m "📸 update thumbnail" || echo "no changes"
          git push
